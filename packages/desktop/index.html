<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="Content-Security-Policy"
        content="default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src https://fonts.gstatic.com; img-src 'self' data:;">
    <title>Lala</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
    <style>
        :root {
            --bg: #0f1117;
            --surface: #1a1d24;
            --surface-hover: #22252d;
            --text: #f3f4f6;
            --text-muted: #9ca3af;
            --border: #2d3140;
            --primary: #7c3aed;
            --primary-hover: #6d28d9;
            --danger: #ef4444;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            background: var(--bg);
            color: var(--text);
            font-family: 'Inter', -apple-system, sans-serif;
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100vh;
            -webkit-app-region: drag;
            user-select: none;
        }

        .container {
            background: var(--surface);
            padding: 36px;
            border-radius: 16px;
            border: 1px solid var(--border);
            width: 100%;
            max-width: 420px;
            box-shadow: 0 16px 48px -8px rgba(0, 0, 0, 0.6);
            position: relative;
        }

        .logo {
            width: 64px;
            height: 64px;
            margin: 0 auto 16px;
            display: block;
            border-radius: 16px;
        }

        .logo--connecting {
            animation: logo-pulse 1.5s ease-in-out infinite;
        }

        @keyframes logo-pulse {
            0%, 100% { transform: scale(1); opacity: 1; }
            50% { transform: scale(1.05); opacity: 0.7; }
        }

        h1 {
            text-align: center;
            font-size: 22px;
            font-weight: 700;
            margin-bottom: 4px;
        }

        .subtitle {
            text-align: center;
            color: var(--text-muted);
            font-size: 13px;
            margin-bottom: 28px;
        }

        form {
            display: flex;
            flex-direction: column;
            gap: 12px;
            -webkit-app-region: no-drag;
        }

        .input-group {
            position: relative;
        }

        input[type="url"] {
            width: 100%;
            background: var(--bg);
            border: 1px solid var(--border);
            color: var(--text);
            padding: 12px 16px;
            border-radius: 10px;
            font-size: 15px;
            font-family: inherit;
            outline: none;
            transition: border-color 0.2s, box-shadow 0.2s;
        }

        input:focus {
            border-color: var(--primary);
            box-shadow: 0 0 0 3px color-mix(in srgb, var(--primary) 15%, transparent);
        }

        input::placeholder { color: var(--text-muted); }

        .btn-connect {
            background: var(--primary);
            color: white;
            border: none;
            padding: 12px 16px;
            border-radius: 10px;
            font-size: 15px;
            font-weight: 600;
            font-family: inherit;
            cursor: pointer;
            transition: background 0.15s, transform 0.1s;
        }

        .btn-connect:hover { background: var(--primary-hover); }
        .btn-connect:active { transform: scale(0.98); }
        .btn-connect:disabled { opacity: 0.6; cursor: not-allowed; transform: none; }

        /* Saved servers */
        .servers { margin-bottom: 24px; }

        .servers-header {
            font-size: 11px;
            font-weight: 600;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 0.05em;
            margin-bottom: 8px;
        }

        .server-list {
            display: flex;
            flex-direction: column;
            gap: 4px;
            -webkit-app-region: no-drag;
            max-height: 210px;
            overflow-y: auto;
        }

        .server-card {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 10px 12px;
            border-radius: 8px;
            background: var(--bg);
            border: 1px solid var(--border);
            color: var(--text);
            font-family: inherit;
            cursor: pointer;
            text-align: left;
            transition: background 0.15s, border-color 0.15s;
            width: 100%;
        }

        .server-card:hover {
            background: var(--surface-hover);
            border-color: var(--primary);
        }

        .server-card-info {
            flex: 1;
            overflow: hidden;
            min-width: 0;
        }

        .server-card-label {
            font-size: 14px;
            font-weight: 600;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }

        .server-card-label-edit {
            background: var(--bg);
            border: 1px solid var(--primary);
            color: var(--text);
            font-size: 14px;
            font-weight: 600;
            font-family: inherit;
            border-radius: 4px;
            padding: 1px 4px;
            outline: none;
            width: 100%;
        }

        .server-card-url {
            font-size: 12px;
            color: var(--text-muted);
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }

        .server-card-status {
            display: flex;
            align-items: center;
            gap: 6px;
            flex-shrink: 0;
        }

        .server-card-ping {
            font-size: 11px;
            color: var(--text-muted);
            white-space: nowrap;
        }

        .server-card-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: var(--text-muted);
            flex-shrink: 0;
            transition: background 0.3s;
        }

        .server-card-dot--online { background: #22c55e; }
        .server-card-dot--offline { background: var(--danger); }

        .server-card-actions {
            display: flex;
            align-items: center;
            gap: 2px;
            opacity: 0;
            transition: opacity 0.15s;
        }

        .server-card:hover .server-card-actions { opacity: 1; }

        .server-card-btn {
            background: none;
            border: none;
            color: var(--text-muted);
            font-size: 14px;
            cursor: pointer;
            padding: 2px 4px;
            border-radius: 4px;
            transition: color 0.15s, background 0.15s;
            -webkit-app-region: no-drag;
            line-height: 1;
        }

        .server-card-btn:hover {
            color: var(--text);
            background: var(--surface-hover);
        }

        .server-card-btn--danger:hover {
            color: var(--danger);
        }

        /* Divider */
        .divider {
            display: flex;
            align-items: center;
            gap: 12px;
            margin: 20px 0 16px;
        }

        .divider::before, .divider::after {
            content: '';
            flex: 1;
            height: 1px;
            background: var(--border);
        }

        .divider-text {
            font-size: 11px;
            font-weight: 600;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 0.05em;
            white-space: nowrap;
        }

        .error-msg {
            color: var(--danger);
            font-size: 12px;
            text-align: center;
            min-height: 18px;
        }

        .version {
            text-align: center;
            font-size: 11px;
            color: var(--text-muted);
            margin-top: 24px;
        }

        /* Auto-connect toggle */
        .auto-connect-toggle {
            display: flex;
            align-items: center;
            gap: 8px;
            margin-top: 12px;
            font-size: 12px;
            color: var(--text-muted);
            cursor: pointer;
            -webkit-app-region: no-drag;
        }

        /* Splash screen */
        .splash {
            text-align: center;
        }

        .splash-status {
            color: var(--text-muted);
            font-size: 14px;
            margin-top: 12px;
        }

        .splash-cancel {
            cursor: pointer;
            transition: background 0.15s;
        }

        .splash-cancel:hover {
            background: var(--surface-hover) !important;
        }

        @keyframes splash-pulse {
            0%, 100% { opacity: 0.5; }
            50% { opacity: 1; }
        }

        .splash-status {
            animation: splash-pulse 1.5s ease-in-out infinite;
        }
    </style>
</head>

<body>
    <div class="container" id="mainContainer" style="display:none">
        <img class="logo" id="mainLogo" src="build/icons/64x64.png" alt="Lala" />
        <h1>Lala</h1>
        <p class="subtitle" id="subtitleText"></p>

        <!-- Saved servers section (shown above input when servers exist) -->
        <div class="servers" id="serversSection" style="display:none">
            <div class="servers-header" id="serversHeader"></div>
            <div class="server-list" id="serverList"></div>
            <label class="auto-connect-toggle" id="autoConnectToggle">
                <input type="checkbox" id="noAutoConnectCheckbox" />
                <span id="noAutoConnectLabel"></span>
            </label>
        </div>

        <!-- Divider (shown when servers exist) -->
        <div class="divider" id="addServerDivider" style="display:none">
            <span class="divider-text" id="addServerDividerText"></span>
        </div>

        <form id="connectForm">
            <div class="input-group">
                <input type="url" id="urlInput" placeholder="https://lala.example.com" required autocomplete="url" autofocus />
            </div>
            <button type="submit" class="btn-connect" id="connectBtn"></button>
            <div class="error-msg" id="errorMsg"></div>
        </form>

        <div class="version" id="versionInfo"></div>
    </div>

    <!-- Splash screen shown during auto-connect -->
    <div class="splash" id="splashScreen" style="display:none">
        <img class="logo logo--connecting" id="splashLogo" src="build/icons/64x64.png" alt="Lala" />
        <h1>Lala</h1>
        <div class="splash-status" id="splashStatus"></div>
        <button type="button" class="btn-connect splash-cancel" id="splashCancelBtn" style="background:transparent; border:1px solid var(--border); font-size:13px; padding:8px 24px; margin-top:16px; -webkit-app-region:no-drag;"></button>
    </div>

    <script src="connection.js"></script>
</body>

</html>
