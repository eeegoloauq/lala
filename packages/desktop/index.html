<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="Content-Security-Policy"
        content="default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src https://fonts.gstatic.com; img-src 'self' data:;">
    <title>Lala</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
    <style>
        :root {
            --bg: #0f1117;
            --surface: #1a1d24;
            --surface-hover: #22252d;
            --text: #f3f4f6;
            --text-muted: #9ca3af;
            --border: #2d3140;
            --primary: #7c3aed;
            --primary-hover: #6d28d9;
            --danger: #ef4444;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            background: var(--bg);
            color: var(--text);
            font-family: 'Inter', -apple-system, sans-serif;
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100vh;
            -webkit-app-region: drag;
            user-select: none;
        }

        .container {
            background: var(--surface);
            padding: 36px;
            border-radius: 16px;
            border: 1px solid var(--border);
            width: 100%;
            max-width: 420px;
            box-shadow: 0 16px 48px -8px rgba(0, 0, 0, 0.6);
            position: relative;
        }

        .logo {
            width: 64px;
            height: 64px;
            margin: 0 auto 16px;
            display: block;
            border-radius: 16px;
        }

        .logo--connecting {
            animation: logo-pulse 1.5s ease-in-out infinite;
        }

        @keyframes logo-pulse {
            0%, 100% { transform: scale(1); opacity: 1; }
            50% { transform: scale(1.05); opacity: 0.7; }
        }

        h1 {
            text-align: center;
            font-size: 22px;
            font-weight: 700;
            margin-bottom: 4px;
        }

        .subtitle {
            text-align: center;
            color: var(--text-muted);
            font-size: 13px;
            margin-bottom: 28px;
        }

        form {
            display: flex;
            flex-direction: column;
            gap: 12px;
            -webkit-app-region: no-drag;
        }

        .input-group {
            position: relative;
        }

        input[type="url"] {
            width: 100%;
            background: var(--bg);
            border: 1px solid var(--border);
            color: var(--text);
            padding: 12px 16px;
            border-radius: 10px;
            font-size: 15px;
            font-family: inherit;
            outline: none;
            transition: border-color 0.2s, box-shadow 0.2s;
        }

        input:focus {
            border-color: var(--primary);
            box-shadow: 0 0 0 3px color-mix(in srgb, var(--primary) 15%, transparent);
        }

        input::placeholder { color: var(--text-muted); }

        .btn-connect {
            background: var(--primary);
            color: white;
            border: none;
            padding: 12px 16px;
            border-radius: 10px;
            font-size: 15px;
            font-weight: 600;
            font-family: inherit;
            cursor: pointer;
            transition: background 0.15s, transform 0.1s;
        }

        .btn-connect:hover { background: var(--primary-hover); }
        .btn-connect:active { transform: scale(0.98); }
        .btn-connect:disabled { opacity: 0.6; cursor: not-allowed; transform: none; }

        /* Saved servers */
        .servers { margin-bottom: 24px; }

        .servers-header {
            font-size: 11px;
            font-weight: 600;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 0.05em;
            margin-bottom: 8px;
        }

        .server-list {
            display: flex;
            flex-direction: column;
            gap: 4px;
            -webkit-app-region: no-drag;
            max-height: 210px;
            overflow-y: auto;
        }

        .server-card {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 10px 12px;
            border-radius: 8px;
            background: var(--bg);
            border: 1px solid var(--border);
            color: var(--text);
            font-family: inherit;
            cursor: pointer;
            text-align: left;
            transition: background 0.15s, border-color 0.15s;
            width: 100%;
        }

        .server-card:hover {
            background: var(--surface-hover);
            border-color: var(--primary);
        }

        .server-card-info {
            flex: 1;
            overflow: hidden;
            min-width: 0;
        }

        .server-card-label {
            font-size: 14px;
            font-weight: 600;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }

        .server-card-label-edit {
            background: var(--bg);
            border: 1px solid var(--primary);
            color: var(--text);
            font-size: 14px;
            font-weight: 600;
            font-family: inherit;
            border-radius: 4px;
            padding: 1px 4px;
            outline: none;
            width: 100%;
        }

        .server-card-url {
            font-size: 12px;
            color: var(--text-muted);
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }

        .server-card-status {
            display: flex;
            align-items: center;
            gap: 6px;
            flex-shrink: 0;
        }

        .server-card-ping {
            font-size: 11px;
            color: var(--text-muted);
            white-space: nowrap;
        }

        .server-card-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: var(--text-muted);
            flex-shrink: 0;
            transition: background 0.3s;
        }

        .server-card-dot--online { background: #22c55e; }
        .server-card-dot--offline { background: var(--danger); }

        .server-card-actions {
            display: flex;
            align-items: center;
            gap: 2px;
            opacity: 0;
            transition: opacity 0.15s;
        }

        .server-card:hover .server-card-actions { opacity: 1; }

        .server-card-btn {
            background: none;
            border: none;
            color: var(--text-muted);
            font-size: 14px;
            cursor: pointer;
            padding: 2px 4px;
            border-radius: 4px;
            transition: color 0.15s, background 0.15s;
            -webkit-app-region: no-drag;
            line-height: 1;
        }

        .server-card-btn:hover {
            color: var(--text);
            background: var(--surface-hover);
        }

        .server-card-btn--danger:hover {
            color: var(--danger);
        }

        /* Divider */
        .divider {
            display: flex;
            align-items: center;
            gap: 12px;
            margin: 20px 0 16px;
        }

        .divider::before, .divider::after {
            content: '';
            flex: 1;
            height: 1px;
            background: var(--border);
        }

        .divider-text {
            font-size: 11px;
            font-weight: 600;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 0.05em;
            white-space: nowrap;
        }

        .error-msg {
            color: var(--danger);
            font-size: 12px;
            text-align: center;
            min-height: 18px;
        }

        .version {
            text-align: center;
            font-size: 11px;
            color: var(--text-muted);
            margin-top: 24px;
        }

        /* Auto-connect toggle */
        .auto-connect-toggle {
            display: flex;
            align-items: center;
            gap: 8px;
            margin-top: 12px;
            font-size: 12px;
            color: var(--text-muted);
            cursor: pointer;
            -webkit-app-region: no-drag;
        }

        /* Splash screen */
        .splash {
            text-align: center;
        }

        .splash-status {
            color: var(--text-muted);
            font-size: 14px;
            margin-top: 12px;
        }

        .splash-cancel {
            cursor: pointer;
            transition: background 0.15s;
        }

        .splash-cancel:hover {
            background: var(--surface-hover) !important;
        }

        @keyframes splash-pulse {
            0%, 100% { opacity: 0.5; }
            50% { opacity: 1; }
        }

        .splash-status {
            animation: splash-pulse 1.5s ease-in-out infinite;
        }
    </style>
</head>

<body>
    <div class="container" id="mainContainer" style="display:none">
        <img class="logo" id="mainLogo" src="build/icons/64x64.png" alt="Lala" />
        <h1>Lala</h1>
        <p class="subtitle" id="subtitleText"></p>

        <!-- Saved servers section (shown above input when servers exist) -->
        <div class="servers" id="serversSection" style="display:none">
            <div class="servers-header" id="serversHeader"></div>
            <div class="server-list" id="serverList"></div>
            <label class="auto-connect-toggle" id="autoConnectToggle">
                <input type="checkbox" id="noAutoConnectCheckbox" />
                <span id="noAutoConnectLabel"></span>
            </label>
        </div>

        <!-- Divider (shown when servers exist) -->
        <div class="divider" id="addServerDivider" style="display:none">
            <span class="divider-text" id="addServerDividerText"></span>
        </div>

        <form id="connectForm">
            <div class="input-group">
                <input type="url" id="urlInput" placeholder="https://lala.example.com" required autocomplete="url" autofocus />
            </div>
            <button type="submit" class="btn-connect" id="connectBtn"></button>
            <div class="error-msg" id="errorMsg"></div>
        </form>

        <div class="version" id="versionInfo"></div>
    </div>

    <!-- Splash screen shown during auto-connect -->
    <div class="splash" id="splashScreen" style="display:none">
        <img class="logo logo--connecting" id="splashLogo" src="build/icons/64x64.png" alt="Lala" />
        <h1>Lala</h1>
        <div class="splash-status" id="splashStatus"></div>
        <button type="button" class="btn-connect splash-cancel" id="splashCancelBtn" style="background:transparent; border:1px solid var(--border); font-size:13px; padding:8px 24px; margin-top:16px; -webkit-app-region:no-drag;"></button>
    </div>

    <script>
        const TRANSLATIONS = {
            en: {
                subtitle: 'Connect to server',
                connect: 'Connect',
                savedServers: 'Saved servers',
                addNewServer: 'Add new server',
                noAutoConnect: "Don't auto-connect",
                connecting: 'Connecting...',
                remove: 'Remove',
                editLabel: 'Edit label',
                connectionFailed: 'Server is unavailable',
                connectingTo: 'Connecting to <strong style="color: var(--text)">%s</strong>...',
                cancel: 'Cancel',
            },
            ru: {
                subtitle: 'Подключиться к серверу',
                connect: 'Подключиться',
                savedServers: 'Сохранённые серверы',
                addNewServer: 'Новый сервер',
                noAutoConnect: 'Не подключаться автоматически',
                connecting: 'Подключение...',
                remove: 'Удалить',
                editLabel: 'Изменить название',
                connectionFailed: 'Сервер недоступен',
                connectingTo: 'Подключение к <strong style="color: var(--text)">%s</strong>...',
                cancel: 'Отмена',
            }
        };

        function detectLanguage() {
            const saved = localStorage.getItem('lala_language');
            if (saved) return saved;
            const nav = navigator.language || 'en';
            return nav.startsWith('ru') ? 'ru' : 'en';
        }

        function t(key) {
            const lang = detectLanguage();
            return (TRANSLATIONS[lang] || TRANSLATIONS.en)[key] || TRANSLATIONS.en[key] || key;
        }

        const urlParams = new URLSearchParams(window.location.search);
        const returnedFromError = urlParams.get('error') === '1';

        const SAVED_KEY = 'lala_saved_servers';
        const LEGACY_KEY = 'lala_recent_servers';
        const MAX_SAVED = 10;

        const form = document.getElementById('connectForm');
        const input = document.getElementById('urlInput');
        const errorMsg = document.getElementById('errorMsg');
        const connectBtn = document.getElementById('connectBtn');
        const serversSection = document.getElementById('serversSection');
        const serverList = document.getElementById('serverList');
        const versionInfo = document.getElementById('versionInfo');
        const mainLogo = document.getElementById('mainLogo');

        // ─── Migration from lala_recent_servers ────────────────────
        function migrateRecentServers() {
            if (localStorage.getItem(SAVED_KEY)) return;
            const legacy = localStorage.getItem(LEGACY_KEY);
            if (!legacy) return;
            try {
                const urls = JSON.parse(legacy);
                if (!Array.isArray(urls) || urls.length === 0) return;
                const now = Date.now();
                const migrated = urls.map((url, i) => {
                    let label;
                    try { label = new URL(url).hostname; } catch { label = url; }
                    return { url, label, lastConnected: now - i * 1000 };
                });
                localStorage.setItem(SAVED_KEY, JSON.stringify(migrated));
                localStorage.removeItem(LEGACY_KEY);
            } catch {}
        }
        migrateRecentServers();

        // ─── Saved servers ────────────────────────────────────────
        function getSavedServers() {
            try {
                const arr = JSON.parse(localStorage.getItem(SAVED_KEY) || '[]');
                arr.sort((a, b) => b.lastConnected - a.lastConnected);
                return arr;
            } catch { return []; }
        }

        function saveServer(url) {
            const servers = getSavedServers();
            const idx = servers.findIndex(s => s.url === url);
            if (idx >= 0) {
                servers[idx].lastConnected = Date.now();
            } else {
                let label;
                try { label = new URL(url).hostname; } catch { label = url; }
                servers.push({ url, label, lastConnected: Date.now() });
            }
            servers.sort((a, b) => b.lastConnected - a.lastConnected);
            if (servers.length > MAX_SAVED) servers.length = MAX_SAVED;
            localStorage.setItem(SAVED_KEY, JSON.stringify(servers));
        }

        function removeServer(url) {
            const servers = getSavedServers().filter(s => s.url !== url);
            localStorage.setItem(SAVED_KEY, JSON.stringify(servers));
            renderServers();
        }

        function updateServerLabel(url, label) {
            const servers = getSavedServers();
            const server = servers.find(s => s.url === url);
            if (server) {
                server.label = label.trim() || server.label;
                localStorage.setItem(SAVED_KEY, JSON.stringify(servers));
            }
        }

        // ─── Health check (via IPC to bypass CORS) ─────────────
        const pingCache = new Map(); // url → { ms: number|null, time: number }
        const PING_CACHE_TTL = 15000; // 15s

        async function pingServer(url, useCache = false) {
            if (useCache) {
                const cached = pingCache.get(url);
                if (cached && Date.now() - cached.time < PING_CACHE_TTL) return cached.ms;
            }
            try {
                const ms = await window.electronAPI.pingServer(url);
                pingCache.set(url, { ms, time: Date.now() });
                return ms;
            } catch {
                pingCache.set(url, { ms: null, time: Date.now() });
                return null;
            }
        }

        async function connectTo(url) {
            connectBtn.disabled = true;
            connectBtn.textContent = t('connecting');
            mainLogo.classList.add('logo--connecting');
            errorMsg.textContent = '';

            const ping = await pingServer(url);
            if (ping === null) {
                errorMsg.textContent = t('connectionFailed');
                connectBtn.disabled = false;
                connectBtn.textContent = t('connect');
                mainLogo.classList.remove('logo--connecting');
                return;
            }

            saveServer(url);
            window.electronAPI.loadUrl(url);
        }

        let isEditingLabel = false;

        function startEditLabel(url, labelEl) {
            const servers = getSavedServers();
            const server = servers.find(s => s.url === url);
            if (!server) return;

            isEditingLabel = true;
            const currentLabel = server.label;
            const editInput = document.createElement('input');
            editInput.type = 'text';
            editInput.className = 'server-card-label-edit';
            editInput.value = currentLabel;

            labelEl.replaceWith(editInput);
            editInput.focus();
            editInput.select();

            function commit() {
                const newLabel = editInput.value.trim() || currentLabel;
                updateServerLabel(url, newLabel);
                isEditingLabel = false;
                renderServers();
            }

            editInput.addEventListener('blur', commit);
            editInput.addEventListener('keydown', (e) => {
                if (e.key === 'Enter') { e.preventDefault(); editInput.blur(); }
                if (e.key === 'Escape') { editInput.value = currentLabel; editInput.blur(); }
            });
        }

        function renderServers() {
            const servers = getSavedServers();
            const divider = document.getElementById('addServerDivider');

            if (servers.length === 0) {
                serversSection.style.display = 'none';
                divider.style.display = 'none';
                return;
            }

            serversSection.style.display = 'block';
            divider.style.display = 'flex';
            serverList.innerHTML = '';

            servers.forEach(server => {
                const card = document.createElement('div');
                card.className = 'server-card';

                const info = document.createElement('div');
                info.className = 'server-card-info';

                const labelEl = document.createElement('div');
                labelEl.className = 'server-card-label';
                labelEl.textContent = server.label;

                const urlEl = document.createElement('div');
                urlEl.className = 'server-card-url';
                try {
                    urlEl.textContent = new URL(server.url).host;
                } catch {
                    urlEl.textContent = server.url;
                }

                info.appendChild(labelEl);
                info.appendChild(urlEl);

                // Status indicator (ping dot + latency)
                const status = document.createElement('div');
                status.className = 'server-card-status';
                const pingLabel = document.createElement('span');
                pingLabel.className = 'server-card-ping';
                const dot = document.createElement('div');
                dot.className = 'server-card-dot';
                status.appendChild(pingLabel);
                status.appendChild(dot);

                // Async ping (cached to avoid re-fetching on every render)
                pingServer(server.url, true).then(ms => {
                    if (ms !== null) {
                        dot.className = 'server-card-dot server-card-dot--online';
                        pingLabel.textContent = ms + ' ms';
                    } else {
                        dot.className = 'server-card-dot server-card-dot--offline';
                    }
                });

                const actions = document.createElement('div');
                actions.className = 'server-card-actions';

                // Edit button (pencil icon)
                const editBtn = document.createElement('button');
                editBtn.className = 'server-card-btn';
                editBtn.type = 'button';
                editBtn.innerHTML = '&#9998;';
                editBtn.title = t('editLabel');
                editBtn.addEventListener('click', (e) => {
                    e.stopPropagation();
                    startEditLabel(server.url, labelEl);
                });

                // Remove button
                const removeBtn = document.createElement('button');
                removeBtn.className = 'server-card-btn server-card-btn--danger';
                removeBtn.type = 'button';
                removeBtn.textContent = '\u00D7';
                removeBtn.title = t('remove');
                removeBtn.addEventListener('click', (e) => {
                    e.stopPropagation();
                    removeServer(server.url);
                });

                actions.appendChild(editBtn);
                actions.appendChild(removeBtn);

                card.appendChild(info);
                card.appendChild(status);
                card.appendChild(actions);
                card.addEventListener('click', () => {
                    if (isEditingLabel) return;
                    input.value = server.url;
                    connectTo(server.url);
                });
                serverList.appendChild(card);
            });
        }

        // ─── Form submit ────────────────────────────────────────────
        form.addEventListener('submit', (e) => {
            e.preventDefault();
            const url = input.value.trim();
            if (!url) return;
            connectTo(url);
        });

        // ─── Error handling ─────────────────────────────────────────
        if (window.electronAPI?.onLoadUrlError) {
            window.electronAPI.onLoadUrlError((error) => {
                if (autoConnecting) {
                    autoConnecting = false;
                    document.getElementById('splashScreen').style.display = 'none';
                    document.getElementById('mainContainer').style.display = '';
                    renderServers();
                }
                errorMsg.textContent = error.message || t('connectionFailed');
                connectBtn.disabled = false;
                connectBtn.textContent = t('connect');
                mainLogo.classList.remove('logo--connecting');
            });
        }

        // ─── Auto-connect ────────────────────────────────────────────
        let autoConnecting = false;
        let autoConnectCancelled = false;
        const AUTO_CONNECT_KEY = 'lala_no_auto_connect';

        async function showAutoConnect(url) {
            autoConnecting = true;
            const host = (() => { try { return new URL(url).host; } catch { return url.replace(/[<>&"']/g, ''); } })();

            document.getElementById('mainContainer').style.display = 'none';
            const splash = document.getElementById('splashScreen');
            splash.style.display = '';
            document.getElementById('splashStatus').innerHTML = t('connectingTo').replace('%s', host);
            const cancelBtn = document.getElementById('splashCancelBtn');
            cancelBtn.textContent = t('cancel');
            cancelBtn.onclick = () => {
                autoConnectCancelled = true;
                autoConnecting = false;
                splash.style.display = 'none';
                document.getElementById('mainContainer').style.display = '';
                renderServers();
            };

            const ping = await pingServer(url);
            if (autoConnectCancelled) return;
            if (ping === null) {
                autoConnecting = false;
                splash.style.display = 'none';
                document.getElementById('mainContainer').style.display = '';
                errorMsg.textContent = t('connectionFailed');
                renderServers();
                return;
            }

            saveServer(url);
            connectBtn.disabled = true;
            window.electronAPI.loadUrl(url);
        }

        // ─── Apply translations ──────────────────────────────────────
        function applyTranslations() {
            document.documentElement.lang = detectLanguage();
            document.getElementById('subtitleText').textContent = t('subtitle');
            connectBtn.textContent = t('connect');
            document.getElementById('serversHeader').textContent = t('savedServers');
            document.getElementById('addServerDividerText').textContent = t('addNewServer');
            document.getElementById('noAutoConnectLabel').textContent = t('noAutoConnect');
            renderServers();
        }

        // ─── Init ───────────────────────────────────────────────────
        applyTranslations();
        renderServers();

        // Auto-connect toggle
        const noAutoCheckbox = document.getElementById('noAutoConnectCheckbox');
        noAutoCheckbox.checked = localStorage.getItem(AUTO_CONNECT_KEY) === 'true';
        noAutoCheckbox.addEventListener('change', () => {
            if (noAutoCheckbox.checked) {
                localStorage.setItem(AUTO_CONNECT_KEY, 'true');
            } else {
                localStorage.removeItem(AUTO_CONNECT_KEY);
            }
        });

        // Auto-connect to last server unless disabled
        const saved = getSavedServers();
        const noAutoConnect = localStorage.getItem(AUTO_CONNECT_KEY) === 'true';
        if (returnedFromError) {
            document.getElementById('mainContainer').style.display = '';
        } else if (saved.length > 0 && !noAutoConnect) {
            showAutoConnect(saved[0].url);
        } else {
            document.getElementById('mainContainer').style.display = '';
        }

        // Show version
        if (window.electronAPI?.getAppInfo) {
            window.electronAPI.getAppInfo().then(info => {
                versionInfo.textContent = `v${info.version} · ${info.platform}`;
            });
        }
    </script>
</body>

</html>
