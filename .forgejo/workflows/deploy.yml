name: Build & Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  # Typecheck gate — there are no tests yet, so this is the only thing standing
  # between a broken build and prod. Runs before any image is built or pushed.
  check:
    runs-on: docker
    container:
      image: node:22-bookworm
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Typecheck api
        run: |
          cd packages/api
          npm ci --ignore-scripts
          npx tsc --noEmit

      - name: Typecheck web
        run: |
          cd packages/web
          npm ci --ignore-scripts
          npx tsc --noEmit

  build:
    runs-on: docker
    container:
      image: node:22-bookworm
    needs: check
    env:
      REGISTRY: ${{ secrets.REGISTRY }}
      IMAGE_API: ${{ secrets.REGISTRY }}/homelab/lala-api
      IMAGE_WEB: ${{ secrets.REGISTRY }}/homelab/lala-web
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install docker CLI
        run: |
          curl -fsSL https://download.docker.com/linux/static/stable/x86_64/docker-27.5.1.tgz \
            | tar xz --strip-components=1 -C /usr/local/bin docker/docker
          docker version --format '{{.Client.Version}}'

      - name: Login to registry
        run: echo "${{ secrets.REGISTRY_TOKEN }}" | docker login "$REGISTRY" -u egor --password-stdin

      # Build context is the repo root so packages/shared (types-only file:
      # dependency of api and web) is reachable inside the builds.
      # Images are SHA-tagged only — no mutable :latest tag, so what runs in
      # prod is always pinned and rollback is unambiguous.
      - name: Build & push api
        run: |
          docker build -f packages/api/Dockerfile -t "$IMAGE_API:${{ github.sha }}" .
          docker push "$IMAGE_API:${{ github.sha }}"

      - name: Build & push web
        run: |
          docker build -f packages/web/Dockerfile --build-arg VITE_LIVEKIT_URL=wss://rtc.egor-solovev.dev \
            -t "$IMAGE_WEB:${{ github.sha }}" .
          docker push "$IMAGE_WEB:${{ github.sha }}"

      # The runner disk is 10G and every push leaves ~320MB of SHA-tagged
      # images behind; without cleanup they pile up until docker build dies
      # with ENOSPC (happened 2026-07-05). Keep only the just-built pair — it
      # doubles as layer cache for the next build; older tags live in the
      # registry anyway.
      - name: Drop superseded local images
        if: always()
        run: |
          docker images --format '{{.Repository}}:{{.Tag}}' \
            | { grep -E "^$REGISTRY/homelab/lala-(api|web):" || true; } \
            | grep -v "${{ github.sha }}" \
            | xargs -r docker rmi || true
          docker image prune -f

  deploy:
    runs-on: docker
    container:
      image: node:22-bookworm
    needs: build
    steps:
      - name: Deploy
        run: |
          apt-get update -q && apt-get install -y -q openssh-client
          mkdir -p ~/.ssh && chmod 700 ~/.ssh
          echo "${{ secrets.LALA_DEPLOY_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -H "${{ secrets.DEPLOY_HOST }}" >> ~/.ssh/known_hosts 2>/dev/null
          ssh -i ~/.ssh/deploy_key -o StrictHostKeyChecking=yes \
            deploy@"${{ secrets.DEPLOY_HOST }}" "${{ github.sha }}"
